site_name: Edison 技術讀書筆記
site_description: 由 mdBook 遷移到 MkDocs 的多主題技術筆記站
site_author: Edison Hsieh
site_url: ""

theme:
  name: material
  language: zh-TW
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

docs_dir: docs
site_dir: site

extra_css:
  - assets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

