site_name: 半導體職務完全指南：從入門到晉升
site_description: Semi Jobs 專書（獨立主題）
site_author: Edison Hsieh

theme:
  name: material
  language: zh-TW
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切換為亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: 切換為深色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

docs_dir: ../docs/semi-jobs
site_dir: ../book/semi-jobs/html
use_directory_urls: false

extra_css:
  - assets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

nav:
  - 導讀: README.md
  - 產業全貌地圖: 00-map.md
  - 職務合作關係圖: 20-collaboration.md
  - CoWoS 跨職務合作: 21-cowos-collaboration.md
  - 一、設計類職務:
      - IC 設計工程師: 01-ic-design.md
      - Layout / 實體設計工程師: 02-layout.md
      - 驗證工程師: 03-verification.md
      - DFT 工程師: 04-dft.md
      - EDA / CAD / PDK 工程師: 05-eda-cad.md
  - 二、製程類職務:
      - 製程工程師總覽: 06-process-overview.md
      - 微影工程師: 07-photo.md
      - 蝕刻 / 薄膜 / CMP 工程師: 08-etch-dep-cmp.md
      - 整合工程師: 09-integration.md
  - 三、設備與廠務:
      - 設備工程師: 10-equipment.md
      - 廠務工程師: 11-facilities.md
  - 四、品質與可靠度:
      - QA / 品質工程師: 12-qa.md
      - 可靠度工程師: 13-reliability.md
      - 失效分析工程師: 14-failure-analysis.md
  - 五、封裝與測試:
      - 封裝工程師: 15-packaging.md
      - 測試工程師: 16-test.md
  - 六、業務技術支援:
      - FAE 現場應用工程師: 17-fae.md
  - 七、製造與 AI:
      - 工業工程師（IE）: 18-ie.md
      - AI / 軟體工程師: 19-ai-software.md
  - 附錄:
      - 薪資全覽比較: appendix-salary.md
      - 入職門檻與學歷規劃: appendix-entry.md
      - 2024–2025 趨勢與熱門職缺: appendix-trends.md
      - 學習資源與求職平台: appendix-resources.md
