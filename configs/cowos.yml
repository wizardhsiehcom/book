site_name: CoWoS 技術精讀筆記：從 2.5D 封裝到 AI 時代
site_description: CoWoS 專書（獨立主題）
site_author: Edison Hsieh

theme:
  name: material
  language: zh-TW
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切換為亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: 切換為深色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

docs_dir: ../docs/cowos
site_dir: ../book/cowos/html
use_directory_urls: false

extra_css:
  - assets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js
  - assets/font-init.js

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

nav:
  - 導讀: README.md
  - 全書地圖: 00-map.md
  - 一、基礎觀念:
      - 為什麼需要先進封裝: 01-why-advanced-packaging.md
      - TSV：矽穿孔技術基礎: 02-tsv-basics.md
      - 矽中介板與 2.5D 整合: 03-silicon-interposer-2d5.md
  - 二、CoWoS 核心技術:
      - CoWoS 架構總覽: 04-cowos-overview.md
      - CoWoS-S：矽中介板版本: 05-cowos-s.md
      - CoWoS-R 與 CoWoS-L：有機與局部矽版本: 06-cowos-r-l.md
      - HBM 整合與記憶體頻寬: 07-hbm-integration.md
  - 三、AI 時代應用:
      - CoWoS 在 AI 加速器中的角色: 08-cowos-ai-hpc.md
      - 競爭技術比較: 09-competing-technologies.md
      - 可靠性與製造挑戰: 10-reliability-manufacturing.md
  - 附錄:
      - 學習資源與論文導讀: appendix-references.md
      - 術語表: appendix-glossary.md
