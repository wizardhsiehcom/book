site_name: 第二大腦：用 LLM 蒸餾筆記成書
site_description: 在「都用 LLM 寫」的前提下，如何讓筆記真正沉澱成書的方法論
site_author: Edison Hsieh

theme:
  name: material
  language: zh-TW
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切換為亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: 切換為深色模式
  features:
    - navigation.top
    - content.code.copy

docs_dir: ../docs/second-brain
site_dir: ../book/second-brain/html
use_directory_urls: false

extra_css:
  - assets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js
  - assets/font-init.js

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

nav:
  - 用 LLM 把筆記蒸餾成書: README.md
  - 用 Claude Code 把對話寫成筆記: claude-code-notes.md
  - 別叫 LLM 記狀態：狀態用算的: derived-state.md
  - 從 Fable 5 被管到該不該學資安: ai-access-security.md
