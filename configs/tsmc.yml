site_name: 台積電全方位指南
site_description: TSMC 專書（獨立主題）
site_author: Edison Hsieh

theme:
  name: material
  language: zh-TW
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切換為亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: 切換為深色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

docs_dir: ../docs/tsmc
site_dir: ../book/tsmc/html
use_directory_urls: false

extra_css:
  - assets/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/mermaid-init.js
  - assets/font-init.js

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

nav:
  - 導讀與學習路線: README.md
  - 一、公司輪廓:
      - 公司概覽: 01-overview.md
      - 歷史沿革: 02-history.md
      - 組織與治理: 03-organization.md
  - 二、技術製程:
      - 製程節點總覽: 04-nodes.md
      - 先進封裝：CoWoS 與 3DFabric: 05-advanced-packaging.md
      - 技術路線圖: 06-roadmap.md
  - 三、產業版圖:
      - 廠區分布: 07-fabs.md
      - 客戶結構: 08-customers.md
      - 上下游供應鏈: 09-supply-chain.md
  - 四、財務與策略:
      - 財務表現: 10-financials.md
      - 地緣政治與全球化: 11-geopolitics.md
  - 五、職涯與學習:
      - 職涯指南: 12-career.md
      - 學習資源: 13-resources.md
