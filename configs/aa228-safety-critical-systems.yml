site_name: AA228V Validation of Safety Critical Systems
site_description: Stanford AA228V 安全關鍵系統的驗證 課程筆記與繁體中文教學
site_author: Wizard
repo_name: book
repo_url: https://github.com/wizardhsieh/book

theme:
  name: material
  language: zh-Hant
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切換至暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切換至亮色模式

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 導讀 Preface: 00-preface.md
  - 1. 課程簡介 Introduction: README.md
  - 2. 系統建模 System Modeling: 02-system-modeling.md
  - 3. 屬性規範（一）Property Specification 1: 03-property-specification-1.md
  - 4. 屬性規範（二）Property Specification 2: 04-property-specification-2.md
  - 5. 基於最佳化的否證 Falsification via Optimization: 05-falsification-optimization.md
  - 6. 基於規劃的否證 Falsification via Planning: 06-falsification-planning.md
  - 7. 客座講座 Anthony Corso（自適應壓力測試）: 07-guest-corso.md
  - 8. 失效分佈 Failure Distribution: 08-failure-distribution.md
  - 9. 重要性採樣 Importance Sampling: 09-importance-sampling.md
  - 10. 自適應重要性採樣 Adaptive IS: 10-adaptive-importance-sampling.md
  - 11. 線性系統可達性 Linear Reachability: 11-linear-reachability.md
  - 12. 非線性系統可達性 Nonlinear Reachability: 12-nonlinear-reachability.md
  - 13. 離散系統可達性 Discrete Reachability: 13-discrete-reachability.md
  - 14. 可解釋性（一）Explainability 1: 14-explainability-1.md
  - 15. 可解釋性（二）Explainability 2: 15-explainability-2.md
  - 16. 客座講座 Somil Bansal（HJ 可達性）: 16-guest-bansal.md
  - 17. 執行時期監控 Runtime Monitoring: 17-runtime-monitoring.md
  - 附錄：術語對照表 Glossary: appendix-glossary.md
  - 附錄：參考資料 References: appendix-references.md

docs_dir: ../docs/aa228-safety-critical-systems
site_dir: ../book/aa228-safety-critical-systems/html
use_directory_urls: false
