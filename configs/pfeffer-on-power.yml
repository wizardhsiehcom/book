site_name: Pfeffer on Power 權力、影響力與組織現實
site_description: Jeffrey Pfeffer 權力與組織現實逐字稿整理的繁體中文書稿
site_author: Wizard

theme:
  name: material
  language: zh-Hant
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切換至暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切換至亮色模式

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 導讀: README.md
  - 第一章：權力不是選修課: 01-why-power-matters.md
  - 第二章：七條規則的底層邏輯: 02-rules-of-power.md
  - 第三章：權力是一種演出能力: 03-acting-with-power.md
  - 第四章：溝通是權力的傳輸方式: 04-communicating-with-power.md
  - 第五章：職場也是公共健康問題: 05-workplace-health.md
  - 第六章：把能見度變成資源: 06-visibility-to-resources.md
  - 第七章：敢開口，才有權力: 07-ask-for-power.md
  - 第八章：別擋自己的路: 08-get-out-of-your-own-way.md
  - 第九章：領導者就是訊息: 09-leader-as-message.md
  - 第十章：把位置變成槓桿: 10-position-as-leverage.md
  - 第十一章：權力是一組可讀的訊號: 11-readable-signals.md
  - 第十二章：自己創造場域: 12-create-the-room.md
  - 第十三章：把職涯做成投資組合: 13-career-portfolio.md
  - 第十四章：想改變世界，就需要權力: 14-power-for-justice.md
  - 第十五章：職場問題不能靠領導神話修好: 15-workplace-leadership-bs.md
  - 第十六章：權力要練習，也要維持: 16-practice-and-keep-power.md
  - 第十七章：創辦人也會失去權力: 17-founders-and-power-loss.md
  - 第十八章：把權力帶到公共場域與新創生態: 18-public-service-and-startup-ecosystems.md
  - 第十九章：權力的操作系統、代價與邊界: 19-operating-system-and-price.md
  - 附錄 A — 術語表: appendix-glossary.md
  - 附錄 B — 參考資料: appendix-references.md

docs_dir: ../docs/pfeffer-on-power
site_dir: ../book/pfeffer-on-power/html
use_directory_urls: false
